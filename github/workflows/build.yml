name: Build Theos Package

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MostashOverlayDemo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Build package
        run: |
          rm -rf packages
          mkdir -p packages
          make package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mostash-overlay-demo
          path: |
            MostashOverlayDemo/packages/*.deb
            MostashOverlayDemo/.theos/**/*.dylib
          if-no-files-found: warn
